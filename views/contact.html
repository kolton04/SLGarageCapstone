<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <title>S&L Garage Door</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link rel="stylesheet" type = "text/css" href="../style/style.css">
        
    </head>

    <body>
        <header class="bg-white py-3 border-bottom border-danger">
            <div class="container-fluid px-lg-5"> <div class="row align-items-center">
                    <div class="col-md-4 text-start">
                        <a href="/home">
                            <img src="/images/SL_Logo.jpg" alt="S&L Garage Door Logo" 
                                style="height: 120px; width: auto; object-fit: contain;">
                        </a>
                    </div>
                    
                    <div class="col-md-4 text-center d-none d-md-block">
                        <span class="text-muted small fw-bold text-uppercase" style="letter-spacing: 1px;">
                            Serving Peru • Kokomo • Logansport
                        </span>
                    </div>

                    <div class="col-md-4 text-end">
                        <a href="tel:7654721289" class="btn btn-outline-danger fw-bold border-2">
                            <i class="bi bi-telephone-fill me-2"></i>(765) 472-1289
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <nav class="navbar navbar-expand navbar-dark bg-dark sticky-top py-0">
            <div class="container-fluid px-0"> <div class="navbar-nav w-100 d-flex justify-content-between">
                    <a class="nav-link text-white flex-fill fw-bold border-end border-secondary" href="/home">HOME</a>
                    <a class="nav-link text-white flex-fill fw-bold border-end border-secondary" href="/services">SERVICES</a>
                    <a class="nav-link text-danger flex-fill fw-bold border-end border-secondary" href="/contact">CONTACT</a>
                    <a class="nav-link text-white flex-fill fw-bold" href="/resources">RESOURCES</a>
                </div>
            </div>
        </nav>

        
        <div class="container my-5">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold">Contact Us</h1>
            </div>

            <div class="mx-auto w-75 p-4 border rounded" style="background-color: #ad313e;">
                <form action="/submit-form" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-white">First Name</label>
                            <input type="text" name = "firstName" class="form-control" placeholder="First Name*" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white">Last Name</label>
                            <input type="text" name = "lastName" class="form-control" placeholder="Last Name*" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Email</label>
                        <input type="email" name = "email" class="form-control" placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Address</label>
                        <input type="text" name = "address" class="form-control" placeholder="Street, City, State">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Message</label>
                        <textarea class="form-control" name = "query" rows="6" placeholder="How can we help?" required></textarea>
                    </div>
                    <div class="d-grid">
                        <button type="submit" id="submitForm" class="form-control mb-1" style="background-color: lightgrey; color: black; outline-color: lightgrey; padding: 12px;">Send Message</button>
                    </div>
                </form>
            </div>
        </div>

        <footer class="mt-5 border-top border-4 border-danger py-5 bg-white w-100">
            <div class="container-fluid px-4 px-lg-5">
                <div class="row align-items-center g-4">
                    <div class="col-md-4 text-center text-md-start">
                        <a href="/home">
                            <img src="/images/SL_Logo.jpg" alt="S&L Logo" style="height: 80px; width: auto; max-width: 100%; object-fit: contain;">
                        </a>
                    </div>
                    <div class="col-md-4 text-center">
                        <h5 class="fw-bold mb-1">S&L Garage Door</h5>
                        <p class="text-muted mb-0">Peru • Kokomo • Logansport</p>
                        <small class="text-secondary">Licensed & Insured</small>
                    </div>
                    <div class="col-md-4 text-center text-md-end">
                        <p class="fw-bold mb-1">Questions? Call us:</p>
                        <a href="tel:7654721289" class="text-danger fw-bold fs-5 text-decoration-none">
                            (765) 472-1289
                        </a>
                        <p class="mt-2 mb-0 small text-muted">© 2026 Group 5</p>
                    </div>
                </div>
            </div>
        </footer>
    </body>
</html>
